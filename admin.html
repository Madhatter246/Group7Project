<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="Styles.css">
    <title>CivicAlert</title>
    <link rel="icon" href="emergency.png" type="image/png">

</head>
<body>
  <div id="loading-screen">
    <div class="loader-container">
        <img src="emergency.png" class="loader-icon">
        <h1>CivicAlert</h1>
        <p>Initializing system...</p>

        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>
  </div>

  <!--TABS TABLE -->
    <div class="header">
        <img src="emergency.png" alt="Emergency Icon" class="header-icon">
        <div>
            <h1>CivicAlert</h1>
            <p>Your Safety Our Priority</p>
        </div>
    </div>

 
      <div class="button-group">
   <button class="tablink active" onclick="Page(event, 'citizen')" id="defaultOpen">Citizen</button>
   <button class="tablink" onclick="Page(event, 'Admin')">Admin</button>
   <button class="tablink" onclick="Page(event, 'FirstResponder')">First Responder</button>
   <button class="tablink" onclick="Page(event, 'About')">About</button>
</div>


<div class="container"> 
    <!-- Login SECTION -->
            <div id="citizen" class="tabcontent">
            
    <!-- Admin SECTION -->
               <div id="Admin" class="tabcontent">
                    <div class="section active" id="Admin-section">
                   <h2>Admin Dashboard</h2>
                    <p>Your report is being viewed</p>   
                    <div class="tabs">
                        <button class="tab active" data-tab="verify">Verify Incidents</button>
                        <button class="tab" data-tab="stats">Statistics</button>
                    </div>
            <div class="tab-wrapper">
                    <div id="verify-tab" class="tab-content active">
                        <div id="Admin-incidents"></div>
                    </div>

                  <div id="stats-tab" class="tab-content">
                        <div class="stats">

                            <div class="stat-card">
                                <div class="stat-number" id="total-incidents">0</div>
                                <div class="stat-label">Total Incidents</div>
                            </div>

                            <div class="stat-card">
                                <div class="stat-number" id="pending-incidents">0</div>
                                <div class="stat-label">Pending Verification</div>
                            </div>

                            <div class="stat-card">
                                <div class="stat-number" id="verified-incidents">0</div>
                                <div class="stat-label">Verified</div>
                            </div>
                        </div>
                    </div>
                  </div>  

                </div>
                </div>  

  

        <div class= "Copyright">
            <p> 2026 CivicAlert System. All rights reserved.</p>
        </div>
   <script src="scripts/CivicAlert.js"></script>
      <script src="server.js"></script>
</body>
</html>
